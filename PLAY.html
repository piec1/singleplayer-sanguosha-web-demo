<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="refresh" content="0; url=./index.html">
    <title>Play Singleplayer Sanguosha</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #061611;
        --panel: rgba(9, 30, 24, 0.88);
        --gold: #f3d78b;
        --text: #f8f1dc;
        --muted: #9dc7b5;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at center, rgba(38, 130, 97, 0.28), transparent 42%),
          linear-gradient(135deg, #04110d, var(--bg));
      }

      main {
        width: min(520px, 100%);
        padding: 32px;
        border: 1px solid rgba(243, 215, 139, 0.28);
        border-radius: 20px;
        background: var(--panel);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.42);
        text-align: center;
      }

      .seal {
        width: 64px;
        height: 64px;
        margin: 0 auto 18px;
        display: grid;
        place-items: center;
        border-radius: 18px;
        background: linear-gradient(145deg, #f8dfa0, #bc8b35);
        color: #641919;
        font-size: 34px;
        font-weight: 900;
        box-shadow: 0 0 34px rgba(243, 215, 139, 0.28);
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(28px, 7vw, 44px);
        line-height: 1;
      }

      p {
        margin: 0 0 22px;
        color: var(--muted);
        line-height: 1.55;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 48px;
        padding: 0 22px;
        border-radius: 999px;
        color: #241806;
        background: var(--gold);
        font-weight: 800;
        text-decoration: none;
      }
    </style>
    <script>
      window.location.replace("./index.html");
    </script>
  </head>
  <body>
    <main>
      <div class="seal" aria-hidden="true">杀</div>
      <h1>Opening the table...</h1>
      <p>If the game does not open automatically, use the button below.</p>
      <a href="./index.html">Click here to play</a>
    </main>
  </body>
</html>
